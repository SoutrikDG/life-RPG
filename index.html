<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life RPG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DRAWER BACKDROP -->
    <div id="drawer-backdrop"></div>

    <!-- SIDE DRAWER -->
    <aside id="app-drawer">
        <div class="drawer-header"><h3>Menu</h3></div>
        <nav class="drawer-nav">
            <button class="nav-item active" data-target="board"><span>⚔️</span> My Board</button>
            <button class="nav-item" data-target="skilllog"><span>📊</span> Skill Log</button>
            <button class="nav-item" data-target="studio"><span>🛠️</span> Habit Studio</button>
        </nav>
    </aside>

    <!-- HERO HEADER -->
    <header class="hero-header" id="profile-trigger">
        <div class="user-profile">
            <div class="avatar">🧙‍♂️</div>
            <div class="user-stats">
                <h1 class="username">Loading Hero...</h1>
                <div class="level-bar-container">
                    <div class="level-text">...</div>
                    <div class="xp-bar"><div class="xp-fill" style="width: 0%"></div></div>
                </div>
                <div class="daily-summary" id="daily-summary">—</div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">

        <!-- BOARD VIEW -->
        <section id="view-board">
            <div id="category-board" class="category-grid">
                <div class="loading">Connecting to Server...</div>
            </div>
        </section>

        <!-- SKILL LOG VIEW -->
        <section id="view-skilllog" style="display:none;">
            <h2 class="section-title">Skill Log</h2>
            <div id="skill-log-list"></div>
        </section>

        <!-- STUDIO VIEW -->
        <section id="view-studio" style="display:none;">
            <h2 class="section-title">Habit Studio</h2>
            <div class="studio-tab-toggle">
                <button class="studio-tab active" data-tab="categories">Categories</button>
                <button class="studio-tab" data-tab="habits">Habits / Skills</button>
            </div>
            <div id="studio-categories" class="studio-panel">
                <button id="btn-new-category" class="btn-sm">+ New Category</button>
                <div id="studio-category-list" class="habit-list" style="margin-top:12px;"></div>
            </div>
            <div id="studio-habits" class="studio-panel" style="display:none;">
                <button id="btn-new-habit" class="btn-sm">+ New Habit / Skill</button>
                <div id="studio-habit-list" class="habit-list" style="margin-top:12px;"></div>
            </div>
        </section>

    </main>

    <!-- BOTTOM SHEET BACKDROP -->
    <div id="sheet-backdrop" class="bottom-sheet-backdrop"></div>

    <!-- BOTTOM SHEET (TIME category logging) -->
    <div id="log-sheet" class="bottom-sheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-content">
            <div class="sheet-header">
                <h3 id="sheet-title">Log Category</h3>
                <button type="button" id="sheet-close" class="btn-icon">✕</button>
            </div>
            <form id="log-form">
                <div class="input-group">
                    <label>Contributor</label>
                    <select id="sheet-contributor"></select>
                </div>
                <div class="input-group">
                    <label id="sheet-duration-label">Duration</label>
                    <div class="input-with-unit">
                        <input type="number" id="sheet-value" step="any" min="0.1" autocomplete="off" placeholder="30">
                        <span id="sheet-unit-label" class="unit-label">mins</span>
                    </div>
                </div>
                <div class="input-group" id="sheet-secondary-group" style="display:none;">
                    <label id="sheet-secondary-label">Distance</label>
                    <div class="input-with-unit">
                        <input type="number" id="sheet-secondary-value" step="any" min="0" autocomplete="off" placeholder="0">
                        <span id="sheet-secondary-unit-label" class="unit-label">Km</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="sheet-date" class="date-input">
                </div>
                <div class="input-group">
                    <label for="sheet-note">What did you work on?</label>
                    <input type="text" id="sheet-note" placeholder="e.g. 2 Leetcode mediums on arrays" autocomplete="off">
                </div>
                <button type="submit" id="sheet-submit" class="btn-submit btn-full" disabled>✦ Complete Quest</button>
            </form>
        </div>
    </div>

    <!-- CATEGORY CONFIG MODAL -->
    <dialog id="cat-config-modal" class="rpg-modal">
        <form id="cat-config-form">
            <div class="modal-header">
                <h3 id="cat-modal-title">New Category</h3>
                <button type="button" id="cat-modal-close" class="btn-icon">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cfg-cat-id">
                <div class="row-group">
                    <div class="input-group" style="flex:0 0 70px">
                        <label>Icon</label>
                        <input type="text" id="cfg-cat-icon" maxlength="2" placeholder="💻">
                    </div>
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="cfg-cat-name" required placeholder="CS Kitchen">
                    </div>
                    <div class="input-group" style="flex:0 0 60px">
                        <label>Color</label>
                        <input type="color" id="cfg-cat-color" value="#3b82f6" class="color-input">
                    </div>
                </div>
                <div class="row-group">
                    <div class="input-group half">
                        <label>Metric Type</label>
                        <select id="cfg-cat-metric-type">
                            <option value="TIME">TIME</option>
                            <option value="BOOL">BOOL</option>
                        </select>
                    </div>
                    <div class="input-group half">
                        <label>Time of Day</label>
                        <select id="cfg-cat-tod">
                            <option value="ANYTIME">Anytime</option>
                            <option value="MORNING">☀ Morning</option>
                            <option value="AFTERNOON">🌤 Afternoon</option>
                            <option value="EVENING">🌙 Evening</option>
                        </select>
                    </div>
                </div>
                <div id="cfg-time-fields">
                    <div class="row-group">
                        <div class="input-group half">
                            <label>Daily Target (mins)</label>
                            <input type="number" id="cfg-cat-target" value="60" min="1">
                        </div>
                        <div class="input-group half">
                            <label>Min Threshold %</label>
                            <input type="number" id="cfg-cat-threshold" value="60" min="1" max="100">
                        </div>
                    </div>
                </div>
                <div id="cfg-bool-fields" style="display:none;">
                    <div class="input-group">
                        <label>Completion Rule</label>
                        <select id="cfg-cat-completion-rule">
                            <option value="ALL">ALL contributors required</option>
                            <option value="ANY">ANY contributor counts</option>
                        </select>
                    </div>
                </div>
                <div class="row-group">
                    <div class="input-group half">
                        <label>XP Weight</label>
                        <input type="number" id="cfg-cat-xp-weight" value="1.0" step="0.1" min="0.1">
                    </div>
                    <div class="input-group half">
                        <label>Sort Order</label>
                        <input type="number" id="cfg-cat-sort" value="99" min="1">
                    </div>
                </div>
                <div class="input-group checkbox-group">
                    <input type="checkbox" id="cfg-cat-active" checked>
                    <label for="cfg-cat-active">Active (show on main board)</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn-submit">Save Category</button>
            </div>
        </form>
    </dialog>

    <!-- HABIT CONFIG MODAL -->
    <!-- FIX #6: Added XP Multiplier field -->
    <dialog id="habit-config-modal" class="rpg-modal">
        <form id="habit-config-form">
            <div class="modal-header">
                <h3 id="habit-modal-title">New Habit / Skill</h3>
                <button type="button" id="habit-modal-close" class="btn-icon">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cfg-habit-id">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="cfg-habit-name" required placeholder="e.g. Zone 2 Sessions">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="cfg-habit-category" required></select>
                </div>
                <div class="row-group">
                    <div class="input-group half">
                        <label>Metric</label>
                        <select id="cfg-habit-metric">
                            <option value="TIME">Time</option>
                            <option value="COUNT">Count</option>
                            <option value="BOOL">Bool</option>
                            <option value="MONEY">Money</option>
                        </select>
                    </div>
                    <div class="input-group half">
                        <label>Unit Label</label>
                        <input type="text" id="cfg-habit-unit" placeholder="Mins">
                    </div>
                </div>
                <div class="row-group">
                    <div class="input-group half">
                        <label>Default Value</label>
                        <input type="number" id="cfg-habit-default" step="any" placeholder="30">
                    </div>
                    <div class="input-group half">
                        <label>XP Multiplier</label>
                        <input type="number" id="cfg-habit-xp-multi" step="0.1" value="1" min="0.1">
                    </div>
                </div>
                <div class="input-group">
                    <label>Color</label>
                    <input type="color" id="cfg-habit-color" value="#3b82f6" class="color-input">
                </div>
                <div class="input-group checkbox-group">
                    <input type="checkbox" id="cfg-habit-secondary">
                    <label for="cfg-habit-secondary">Has Secondary Metric</label>
                </div>
                <div class="input-group" id="cfg-secondary-unit-group" style="display:none;">
                    <label>Secondary Unit Label</label>
                    <input type="text" id="cfg-habit-secondary-unit" placeholder="Km">
                </div>
                <div class="input-group checkbox-group">
                    <input type="checkbox" id="cfg-habit-active" checked>
                    <label for="cfg-habit-active">Active</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn-submit">Save Habit</button>
            </div>
        </form>
    </dialog>

    <!-- SKILL LOG MODAL (inactive category logging + BOOL backdated logging) -->
    <dialog id="skill-log-modal" class="rpg-modal">
        <form id="skill-log-form">
            <div class="modal-header">
                <h3 id="skill-log-modal-title">Log Skill</h3>
                <button type="button" id="skill-log-modal-close" class="btn-icon">✕</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label id="skill-log-value-label">Duration (minutes)</label>
                    <div class="input-with-unit">
                        <input type="number" id="skill-log-value" step="any" min="0.1" required autocomplete="off">
                        <span id="skill-log-unit-label" class="unit-label">mins</span>
                    </div>
                </div>
                <div class="input-group" id="skill-log-secondary-group" style="display:none;">
                    <label id="skill-log-secondary-label">Secondary</label>
                    <div class="input-with-unit">
                        <input type="number" id="skill-log-secondary-value" step="any" min="0" autocomplete="off">
                        <span id="skill-log-secondary-unit-label" class="unit-label"></span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="skill-log-date" class="date-input">
                </div>
                <div class="input-group">
                    <label>Notes (Optional)</label>
                    <input type="text" id="skill-log-note" placeholder="What did you do?" autocomplete="off">
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn-submit">Log Activity</button>
            </div>
        </form>
    </dialog>

    <script src="api.js"></script>
    <script src="app.js"></script>

</body>
</html>
